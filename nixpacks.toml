[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo", "php83Extensions.pdo_mysql", "php83Extensions.mysqli", "php83Extensions.mbstring"]

[phases.install]
cmds = ["curl -sS https://getcomposer.org/installer | php && COMPOSER_ALLOW_SUPERUSER=1 php composer.phar install --no-dev --optimize-autoloader"]

[start]
cmd = "frankenphp run --config /app/Caddyfile"
